<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muestra del Icono Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">
    
    <div class="text-center max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Nuevo Icono Premium</h1>
        <p class="text-gray-500 mb-8">Diseño realista con detalles de billete y Euro en oro.</p>
        
        <!-- Muestra en Grande -->
        <div class="bg-white p-10 rounded-[3rem] shadow-xl inline-block mb-10">
            <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' class="w-48 h-48 drop-shadow-2xl">
                <defs>
                    <!-- Fondo Azul App -->
                    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
                        <stop offset='0%' stop-color='#1e3a8a'/>
                        <stop offset='100%' stop-color='#3b82f6'/>
                    </linearGradient>
                    
                    <!-- Color Verde Billete -->
                    <linearGradient id='bill' x1='0%' y1='0%' x2='100%' y2='100%'>
                        <stop offset='0%' stop-color='#86efac'/>
                        <stop offset='100%' stop-color='#15803d'/>
                    </linearGradient>
                    
                    <!-- Dorado Premium para el Euro -->
                    <linearGradient id='gold' x1='0%' y1='0%' x2='100%' y2='100%'>
                        <stop offset='0%' stop-color='#fef08a'/> <!-- Brillo claro -->
                        <stop offset='45%' stop-color='#eab308'/> <!-- Oro medio -->
                        <stop offset='100%' stop-color='#854d0e'/> <!-- Oro oscuro -->
                    </linearGradient>

                    <!-- Hilo de seguridad holográfico -->
                    <linearGradient id='holo' x1='0%' y1='0%' x2='0%' y2='100%'>
                        <stop offset='0%' stop-color='#fca5a5'/>
                        <stop offset='30%' stop-color='#fcd34d'/>
                        <stop offset='60%' stop-color='#86efac'/>
                        <stop offset='100%' stop-color='#93c5fd'/>
                    </linearGradient>

                    <!-- Textura de fondo del billete -->
                    <pattern id="pattern" width="16" height="16" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.12"/>
                        <circle cx="10" cy="10" r="1.5" fill="#ffffff" opacity="0.12"/>
                    </pattern>
                </defs>

                <!-- Fondo redondeado base App -->
                <rect width='512' height='512' rx='115' fill='url(#bg)'/>
                
                <!-- Billete de fondo (sombra/descuadre) -->
                <g transform='translate(256, 256) rotate(-12) translate(-256, -256)'>
                    <rect x='66' y='136' width='380' height='240' rx='15' fill='#ffffff' opacity='0.2'/>
                </g>
                
                <!-- Billete delantero principal -->
                <g transform='translate(256, 256) rotate(6) translate(-256, -256)'>
                    <!-- Base de papel moneda -->
                    <rect x='66' y='136' width='380' height='240' rx='12' fill='url(#bill)'/>
                    
                    <!-- Textura de puntos de seguridad -->
                    <rect x='66' y='136' width='380' height='240' rx='12' fill='url(#pattern)'/>

                    <!-- Marco externo detallado -->
                    <rect x='82' y='152' width='348' height='208' rx='8' fill='none' stroke='#ffffff' stroke-width='4' opacity='0.7'/>
                    <!-- Marco interno fino -->
                    <rect x='92' y='162' width='328' height='188' rx='4' fill='none' stroke='#ffffff' stroke-width='1.5' opacity='0.5'/>

                    <!-- Esquinas de seguridad (círculos) -->
                    <circle cx='104' cy='174' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                    <circle cx='408' cy='174' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                    <circle cx='104' cy='338' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                    <circle cx='408' cy='338' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>

                    <!-- Banda / Hilo de seguridad holográfico -->
                    <rect x='140' y='136' width='22' height='240' fill='url(#holo)' opacity='0.8'/>
                    <rect x='144' y='136' width='14' height='240' fill='#ffffff' opacity='0.4'/>

                    <!-- Valor del billete -->
                    <text x='125' y='183' font-family='system-ui, sans-serif' font-size='22' font-weight='900' fill='#ffffff' opacity='0.95'>100</text>
                    <text x='387' y='345' font-family='system-ui, sans-serif' font-size='22' font-weight='900' fill='#ffffff' opacity='0.95' text-anchor='end'>100</text>

                    <!-- Marca de agua derecha -->
                    <circle cx='380' cy='256' r='45' fill='#ffffff' opacity='0.15'/>
                    <circle cx='380' cy='256' r='35' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.2'/>

                    <!-- Sombra del círculo central (Sustituye al filter para que no falle en móviles) -->
                    <circle cx='256' cy='262' r='75' fill='#000000' opacity='0.2'/>

                    <!-- Círculo central blanco principal -->
                    <circle cx='256' cy='256' r='75' fill='#ffffff'/>
                    
                    <!-- Bordes dorados del sello -->
                    <circle cx='256' cy='256' r='65' fill='none' stroke='url(#gold)' stroke-width='4'/>
                    <circle cx='256' cy='256' r='57' fill='none' stroke='url(#gold)' stroke-width='1.5' opacity='0.6'/>

                    <!-- Símbolo del Euro Dorado -->
                    <text x='256' y='275' font-family='system-ui, -apple-system, sans-serif' font-size='105' font-weight='900' fill='url(#gold)' text-anchor='middle' dominant-baseline='central'>€</text>
                </g>
            </svg>
        </div>
        
        <!-- Previsualización en pequeño simulando la pantalla del móvil -->
        <div class="mt-4">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Así se vería en tu pantalla de inicio</p>
            <div class="flex flex-col items-center justify-center gap-2">
                
                <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' class="w-16 h-16 drop-shadow-md rounded-2xl">
                    <rect width='512' height='512' rx='115' fill='url(#bg)'/>
                    <g transform='translate(256, 256) rotate(-12) translate(-256, -256)'>
                        <rect x='66' y='136' width='380' height='240' rx='15' fill='#ffffff' opacity='0.2'/>
                    </g>
                    <g transform='translate(256, 256) rotate(6) translate(-256, -256)'>
                        <rect x='66' y='136' width='380' height='240' rx='12' fill='url(#bill)'/>
                        <rect x='66' y='136' width='380' height='240' rx='12' fill='url(#pattern)'/>
                        <rect x='82' y='152' width='348' height='208' rx='8' fill='none' stroke='#ffffff' stroke-width='4' opacity='0.7'/>
                        <rect x='92' y='162' width='328' height='188' rx='4' fill='none' stroke='#ffffff' stroke-width='1.5' opacity='0.5'/>
                        <circle cx='104' cy='174' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                        <circle cx='408' cy='174' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                        <circle cx='104' cy='338' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                        <circle cx='408' cy='338' r='14' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.6'/>
                        <rect x='140' y='136' width='22' height='240' fill='url(#holo)' opacity='0.8'/>
                        <rect x='144' y='136' width='14' height='240' fill='#ffffff' opacity='0.4'/>
                        <text x='125' y='183' font-family='system-ui, sans-serif' font-size='22' font-weight='900' fill='#ffffff' opacity='0.95'>100</text>
                        <text x='387' y='345' font-family='system-ui, sans-serif' font-size='22' font-weight='900' fill='#ffffff' opacity='0.95' text-anchor='end'>100</text>
                        <circle cx='380' cy='256' r='45' fill='#ffffff' opacity='0.15'/>
                        <circle cx='380' cy='256' r='35' fill='none' stroke='#ffffff' stroke-width='2' opacity='0.2'/>
                        <circle cx='256' cy='262' r='75' fill='#000000' opacity='0.2'/>
                        <circle cx='256' cy='256' r='75' fill='#ffffff'/>
                        <circle cx='256' cy='256' r='65' fill='none' stroke='url(#gold)' stroke-width='4'/>
                        <circle cx='256' cy='256' r='57' fill='none' stroke='url(#gold)' stroke-width='1.5' opacity='0.6'/>
                        <text x='256' y='275' font-family='system-ui, -apple-system, sans-serif' font-size='105' font-weight='900' fill='url(#gold)' text-anchor='middle' dominant-baseline='central'>€</text>
                    </g>
                </svg>
                
                <span class="text-[13px] font-medium text-gray-800 tracking-wide mt-1">Gastos</span>
            </div>
        </div>
    </div>
</body>
</html>
